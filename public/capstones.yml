# Capstones — the once-per-run exclusive perk ("Promotion").
#
# After the first level completed at/past `offeredAfterLevel`, the shop exit
# routes through a mandatory 1-of-3 draft. The pick applies for the rest of
# the run (surviving ascension); the two passed-over capstones are gone for
# good. These are rule-breakers, not stat bumps - one per archetype, so the
# pick can crown a build or rescue a weak one. Keys are GameModifiers
# (see README-modifiers.md).

offeredAfterLevel: 10

capstones:

  - id: stock_options
    name: Stock Options
    description: The per-map overtime cap rises by 20h for the rest of the run. Big multiplier builds finally pay out.
    tag: risk
    clarify: Overtime is normally capped per map, so any score multiplier beyond the cap is wasted. This raises that ceiling by 20h every map, turning stacked multipliers into real score. Near useless on a low-multiplier build, run-defining on a stacked one.
    modifiers:
      overtimeCapBonus: 20

  - id: company_card
    name: Company Card
    description: The cheapest offer in every shop is free.
    tag: bank
    clarify: The single cheapest upgrade in each shop costs nothing. Over a full run that is a large pile of saved overtime you can redirect into the expensive picks. Best when you plan to keep shopping every level.
    modifiers:
      freeCheapestOffer: 1

  - id: second_wind
    name: Second Wind
    description: Once per map, a fence survives a ball hit without costing a life.
    tag: safety
    clarify: Every map starts with one fence shield. The first ball that would smash a growing fence is absorbed for free, no life lost. A safety net that refreshes each map, so you can fence aggressively in dangerous spots.
    modifiers:
      wallShieldsPerMap: 1

  - id: ghost_protocol
    name: Ghost Protocol
    description: Fences ignore ball hits during their first 1.5 seconds of growth.
    tag: tempo
    clarify: For the first 1.5 seconds of its growth a fence cannot be broken, so you can start one right in a busy lane without instantly losing it. Rewards fast, frequent fencing over slow, cautious placement.
    modifiers:
      fenceGraceMs: 1500

  - id: cryo_protocol
    name: Cryo Protocol
    description: Tap any ball to freeze it for 3 seconds, with no cooldown. Works even without Feature Freeze.
    tag: freeze
    clarify: Grants tap-to-freeze for the whole run with no cooldown, even if you never buy Feature Freeze. Freezing a ball mid-flight makes any chaotic map controllable. The freeze build in a single pick.
    modifiers:
      ballFreezeDuration: 3
      freezeNoCooldown: 1

  - id: golden_handshake
    name: Golden Handshake
    description: Every locked ball pays +2 overtime, and every lock counts as one ball bigger for the trap multiplier.
    tag: lock
    clarify: Two lock payoffs at once. Every locked ball pays +2 overtime, and each lock counts as one ball larger for the simultaneous-trap multiplier. Snowballs hard on maps where you seal several balls together.
    modifiers:
      overtimePerLock: 2
      simultaneousLockBonus: 1
