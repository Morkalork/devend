augments:
  - id: slower-balls
    name: Slower Balls
    description: Reduces base ball speed by 10% per stack.
    maxStacks: 3
    costPerStack: 2
    icon: /icons/super/slower-balls.svg
    effect:
      type: ballSpeedMultiplier
      value: 0.9

  - id: faster-fences
    name: Faster Fences
    description: Increases base fence construction speed by 10% per stack.
    maxStacks: 3
    costPerStack: 2
    icon: /icons/super/faster-fences.svg
    effect:
      type: fenceSpeedMultiplier
      value: 1.1

  - id: extra-margin
    name: Extra Margin
    description: Increases the par fence count by 1 per stack.
    maxStacks: 3
    costPerStack: 3
    icon: /icons/super/extra-margin.svg
    effect:
      type: parFenceBonus
      value: 1

  - id: reduced-area
    name: Reduced Requirement
    description: Reduces the minimum required fenced-off area by 5% per stack.
    maxStacks: 3
    costPerStack: 3
    icon: /icons/super/reduced-area.svg
    effect:
      type: requiredAreaMultiplier
      value: 0.95

  - id: score-interest
    name: Compound Score
    description: Gain 5% interest on unused score between levels per stack.
    maxStacks: 3
    costPerStack: 3
    icon: /icons/super/score-interest.svg
    effect:
      type: scoreInterest
      value: 0.05

  - id: softer-bounces
    name: Softer Bounces
    description: Slightly reduces ball rebound energy per stack.
    maxStacks: 2
    costPerStack: 2
    icon: /icons/super/softer-bounces.svg
    effect:
      type: bounceDamping
      value: 0.95

  - id: thicker-walls
    name: Thicker Walls
    description: Slightly increases wall thickness per stack.
    maxStacks: 2
    costPerStack: 2
    icon: /icons/super/thicker-walls.svg
    effect:
      type: wallThicknessMultiplier
      value: 1.15

  - id: longer-preview
    name: Extended Preview
    description: Slows down wall preview growth per stack.
    maxStacks: 2
    costPerStack: 2
    icon: /icons/super/longer-preview.svg
    effect:
      type: previewSpeedMultiplier
      value: 0.85

  - id: extra-life
    name: Extra Life
    description: Start each run with one additional life per stack.
    maxStacks: 3
    costPerStack: 4
    icon: /icons/super/extra-life.svg
    effect:
      type: startingLivesBonus
      value: 1

  - id: early-stability
    name: Structural Stability
    description: Reduces level variety per stack, making maps more predictable.
    maxStacks: 2
    costPerStack: 2
    icon: /icons/super/early-stability.svg
    effect:
      type: varietyMultiplier
      value: 0.8

  # ========== LOCKED AUGMENTS ==========
  # These require meta progression to unlock

  - id: veteran-reflexes
    name: Veteran Reflexes
    description: Further slows ball speed by 15% per stack.
    maxStacks: 2
    costPerStack: 4
    icon: /icons/super/veteran-reflexes.svg
    effect:
      type: ballSpeedMultiplier
      value: 0.85
    locked: true
    unlockCondition:
      type: highestLevelReached
      threshold: 5
      description: Reach level 5

  - id: master-builder
    name: Master Builder
    description: Increases fence construction speed by 20% per stack.
    maxStacks: 2
    costPerStack: 4
    icon: /icons/super/master-builder.svg
    effect:
      type: fenceSpeedMultiplier
      value: 1.2
    locked: true
    unlockCondition:
      type: highestLevelReached
      threshold: 10
      description: Reach level 10

  - id: fence-mastery
    name: Fence Mastery
    description: Start with +2 par fence bonus per stack.
    maxStacks: 2
    costPerStack: 5
    icon: /icons/super/fence-mastery.svg
    effect:
      type: parFenceBonus
      value: 2
    locked: true
    unlockCondition:
      type: totalFencesDrawn
      threshold: 100
      description: Draw 100 total fences

  - id: perfect-form
    name: Perfect Form
    description: Reduces required area by 10% per stack.
    maxStacks: 2
    costPerStack: 5
    icon: /icons/super/perfect-form.svg
    effect:
      type: requiredAreaMultiplier
      value: 0.9
    locked: true
    unlockCondition:
      type: totalLevelsCompletedWithoutLoss
      threshold: 50
      description: Complete 50 levels without losing a life

  - id: phoenix-rising
    name: Phoenix Rising
    description: Start with +2 extra lives per stack.
    maxStacks: 2
    costPerStack: 6
    icon: /icons/super/phoenix-rising.svg
    effect:
      type: startingLivesBonus
      value: 2
    locked: true
    unlockCondition:
      type: totalLivesLost
      threshold: 100
      description: Lose 100 total lives
