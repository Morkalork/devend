# Loadouts — curse + blessing bundles. One is drafted at the run start
# ("Sprint Planning") to shape the run from level 1; the same catalogue also
# powers the post-final-level Ascension draft. Each `modifiers` map uses the
# same GameModifiers keys as upgrades.yml (see README-modifiers.md); a curse is
# simply an adverse value.
#
# Drafted loadouts stack across ascensions, so keep individual effects
# moderate — a deep run accumulates many of these.
#
# `uniqueWinsRequired` (optional): how many UNIQUE wins (runs beaten with
# distinct run-start loadouts) the player must have before this loadout unlocks
# for the run-start draft. Omit it for the loadouts available from scratch. It
# has no effect on the Ascension draft, which always offers the full catalogue.

ascension:
  # Baseline ball-speed multiplier applied per ascension depth, on top of any
  # drafted mutators. Keeps blessing-heavy drafts from trivialising the loop.
  speedRampPerDepth: 1.08

  # Fence durability: while ascended, fences crumble after this many ball
  # hits — declining linearly from `fenceDurabilityBase` on level 1 to
  # `fenceDurabilityAtFinal` on the final level. Fences bordering captured
  # space never break (they hold back the void). The Defensive Programming
  # shop upgrade adds to these numbers.
  fenceDurabilityBase: 6
  fenceDurabilityAtFinal: 2

loadouts:

  - id: crunch_time
    name: Crunch Time
    curse: Balls move 25% faster.
    blessing: Earn 25% more overtime hours.
    modifiers:
      ballSpeedMultiplier: 1.25
      scoreMultiplier: 1.25

  - id: scope_creep
    name: Scope Creep
    curse: Balls are 30% bigger.
    blessing: Fences grow 35% faster.
    modifiers:
      ballSizeMultiplier: 1.3
      fenceGenerationSpeedMultiplier: 1.35

  - id: death_march
    name: Death March
    curse: Lose one life immediately.
    blessing: Earn 75% more overtime hours.
    # Too harsh as a fresh-run opener (you only start with 3 lives).
    uniqueWinsRequired: 1
    modifiers:
      extraLives: -1
      scoreMultiplier: 1.75

  - id: hiring_freeze
    name: Hiring Freeze
    curse: The shop offers 2 fewer upgrades.
    blessing: All shop prices drop by 10%.
    # Too harsh as a fresh-run opener (the early shop is already small).
    uniqueWinsRequired: 2
    modifiers:
      extraShopItems: -2
      shopDiscountMultiplier: 0.9

  - id: legacy_codebase
    name: Legacy Codebase
    curse: Fences grow 20% slower.
    blessing: Start every map with 2 instant fences.
    uniqueWinsRequired: 3
    modifiers:
      fenceGenerationSpeedMultiplier: 0.8
      instantFencesPerMap: 2

  - id: parallel_pipelines
    name: Parallel Pipelines
    curse: Balls move 15% faster.
    blessing: Draw one extra fence at the same time.
    uniqueWinsRequired: 4
    modifiers:
      ballSpeedMultiplier: 1.15
      additionalConcurrentFences: 1

  - id: tech_debt_audit
    name: Tech Debt Audit
    curse: Balls move 10% faster and are 10% bigger.
    blessing: Cuts have a 25% chance to clear 5% extra space.
    uniqueWinsRequired: 5
    modifiers:
      ballSpeedMultiplier: 1.1
      ballSizeMultiplier: 1.1
      bonusRemovalChance: 0.25
      bonusRemovalAmount: 0.05

  - id: night_school
    name: Night School
    curse: Balls move 20% faster.
    blessing: Bank 1 extra Certificate Hour when the run ends.
    uniqueWinsRequired: 6
    modifiers:
      ballSpeedMultiplier: 1.2
      extraCertificateHours: 1

  - id: micromanagement
    name: Micromanagement
    curse: Balls are 20% bigger.
    blessing: Every locked ball slows the remaining balls by 1%.
    uniqueWinsRequired: 7
    modifiers:
      ballSizeMultiplier: 1.2
      microManagerPerLock: 0.01

  - id: roadmap_clarity
    name: Roadmap Clarity
    curse: Balls move 15% faster.
    blessing: See the predicted path of the two fastest balls.
    uniqueWinsRequired: 8
    modifiers:
      ballSpeedMultiplier: 1.15
      ballPathPredictionBounces: 2
      ballPathPredictionBalls: 2

  - id: golden_handcuffs
    name: Golden Handcuffs
    curse: Earn 25% less overtime.
    blessing: Gain 2 extra lives immediately.
    uniqueWinsRequired: 9
    modifiers:
      scoreMultiplier: 0.75
      extraLives: 2

  - id: agile_transformation
    name: Agile Transformation
    curse: Fences grow 15% slower.
    blessing: The shop offers 1 extra upgrade and restocks twice per visit.
    uniqueWinsRequired: 10
    modifiers:
      fenceGenerationSpeedMultiplier: 0.85
      extraShopItems: 1
      shopRestockCount: 2
