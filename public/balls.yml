# Ball types (issue #37)
#
# The game picks which of these spawn on each map — colour communicates ability.
# A type becomes eligible once the level number reaches its `unlockLevel`.
# Speeds are flat world-units/second (no per-level scaling, no per-cut ramp); the
# `ballSpeedMultiplier` upgrade still scales them at spawn.
#
# Fields:
#   id             unique key (also used for the ball's element id)
#   name           display name (tutorial)
#   color          hex colour WITH a leading '#' (quote it so YAML keeps the '#')
#   baseSpeed      flat base speed in world units/second
#   minimumSpeed   speed floor; slow-down/slow-others/range effects never go below this
#   unlockLevel    minimum level number at which this type may appear
#   lockMultiplier lock-bonus multiplier when this ball is locked away
#   density        relative weight for the breakable force model (default 1). Impact
#                  damage = density x (radius/18)^2 x speed^1.6, so a heavy grey/black
#                  cracks breakables in fewer hits than a light yellow at the same speed
#   ability        one of: none | variableSpeed | slowOthers | moneyBall | slowDown | breakObjects
#   speedReduction (slowOthers only) speed each struck ball loses per hit (down to its minimumSpeed)
#   description    one-line ability summary shown in the tutorial
#   speedRange     (variableSpeed only) [lo, hi] — a new random speed is picked on each
#                  surface contact; the range itself shrinks when the ball is slowed
#   phase2         true = not yet wired up; excluded from selection and the tutorial
#   spawnIntervalSeconds (rainbow only) seconds between spit-outs (default 10)
#   spawnChance    per-map appearance probability 0-1, rolled from the map id
#                  (absent = always eligible). Makes rare types an occasional event.

balls:
  - id: red
    name: Red
    color: "#ff5b5b"
    baseSpeed: 250
    minimumSpeed: 150
    unlockLevel: 1
    lockMultiplier: 1
    density: 1
    ability: none
    description: A standard ball. No special behaviour - just bounces.

  - id: blue
    name: Blue
    color: "#00b4ff"
    baseSpeed: 250
    minimumSpeed: 150
    unlockLevel: 2
    lockMultiplier: 1
    density: 1
    ability: none
    description: A standard ball, a touch faster than the red one.

  - id: yellow
    name: Yellow
    color: "#ffd93d"
    minimumSpeed: 150
    baseSpeed: 280
    unlockLevel: 4
    lockMultiplier: 2
    density: 0.6
    ability: variableSpeed
    description: "Variable speed: every surface it touches shifts it between 200 and 400."
    speedRange: [200, 400]

  - id: purple
    name: Purple
    color: "#b06bff"
    baseSpeed: 340
    minimumSpeed: 150
    unlockLevel: 7
    lockMultiplier: 2
    density: 0.9
    ability: slowOthers
    speedReduction: 20
    description: "Saps momentum: every ball it clashes with loses speed, down to the balls' minimum speed."

  - id: green
    name: Green
    color: "#00c853"
    baseSpeed: 300
    minimumSpeed: 180
    unlockLevel: 13
    lockMultiplier: 2
    density: 1.1
    ability: moneyBall
    description: "Money ball: locking it away triples the gains of every later lock this round."

  - id: grey
    name: Grey
    color: "#9aa3ad"
    baseSpeed: 200
    minimumSpeed: 150
    unlockLevel: 10
    lockMultiplier: 1
    density: 1.6
    ability: slowDown
    description: "Winds down: slows down 10 speedUnits ever 5 seconds. Down to minimum speed."

  - id: black
    name: Black
    color: "#2b2f3a"
    baseSpeed: 200
    minimumSpeed: 150
    unlockLevel: 17
    lockMultiplier: 4
    density: 2.6
    ability: breakObjects
    description: "Wrecking ball: heavy enough to smash mirrors and movers in just a hit or two, losing a multiplier each time."

  # Rainbow: a fast, hue-shifting ball that shows up occasionally past level 10.
  # Every 10 seconds it spits out one random ball type available for the current
  # level (never another rainbow). Trap it fast: the spawns pile up, and every
  # map now has a hard time limit. `color` is the base tint; the renderers cycle
  # its hue at runtime.
  - id: rainbow
    name: Rainbow
    color: "#ff4db8"
    baseSpeed: 360
    minimumSpeed: 260
    unlockLevel: 11
    lockMultiplier: 3
    density: 0.8
    ability: rainbow
    spawnIntervalSeconds: 10
    spawnChance: 0.4
    description: "Prism ball: fast and unstable, it spits out a new ball every 10 seconds. Lock it away before the board fills up."
