certificates:

  # ═══════════════════════════════════════════════════
  # UPGRADE-CHAIN CERTIFICATES
  # Unlocked by buying the max-tier upgrade in a family
  # across 3 separate runs.
  # ═══════════════════════════════════════════════════

  - id: runtime-augmentation
    name: Runtime Augmentation
    description: Perpetually reduced ball speeds - a permanent reward for mastering Runtime Optimisation.
    unlockType: upgrade-chain
    sourceUpgradeId: runtime_optimisation_principal
    requiredRuns: 3
    levels:
      - cost: 3
        effect: { type: ballSpeedMultiplier, value: 0.95 }
      - cost: 5
        effect: { type: ballSpeedMultiplier, value: 0.95 }
      - cost: 8
        effect: { type: ballSpeedMultiplier, value: 0.95 }

  - id: memory-compression
    name: Memory Compression
    description: Perpetually smaller balls - a permanent reward for mastering Memory Footprint.
    unlockType: upgrade-chain
    sourceUpgradeId: memory_footprint_principal
    requiredRuns: 3
    levels:
      - cost: 3
        effect: { type: ballSizeMultiplier, value: 0.95 }
      - cost: 5
        effect: { type: ballSizeMultiplier, value: 0.95 }
      - cost: 8
        effect: { type: ballSizeMultiplier, value: 0.95 }

  - id: compile-cache
    name: Compile Cache
    description: Perpetually faster fence generation - a permanent reward for mastering Fast Compile.
    unlockType: upgrade-chain
    sourceUpgradeId: fast_compile_principal
    requiredRuns: 3
    levels:
      - cost: 3
        effect: { type: fenceGenerationSpeedMultiplier, value: 1.05 }
      - cost: 5
        effect: { type: fenceGenerationSpeedMultiplier, value: 1.05 }
      - cost: 8
        effect: { type: fenceGenerationSpeedMultiplier, value: 1.05 }

  - id: warm-deploy
    name: Warm Deploy
    description: Permanently gain one instant fence at map start - a reward for mastering Hot Start.
    unlockType: upgrade-chain
    sourceUpgradeId: hot_start_architect
    requiredRuns: 3
    levels:
      - cost: 5
        effect: { type: instantFencesPerMap, value: 1 }
      - cost: 9
        effect: { type: instantFencesPerMap, value: 1 }

  - id: parallel-processing
    name: Parallel Processing
    description: Permanently one extra concurrent fence - a reward for mastering Multithreading.
    unlockType: upgrade-chain
    sourceUpgradeId: multithreading_principal
    requiredRuns: 3
    levels:
      - cost: 8
        effect: { type: additionalConcurrentFences, value: 1 }
      - cost: 15
        effect: { type: additionalConcurrentFences, value: 1 }

  - id: resilience-protocol
    name: Resilience Protocol
    description: Permanently start with an extra life - a reward for mastering Fault Tolerance.
    unlockType: upgrade-chain
    sourceUpgradeId: fault_tolerance_architect
    requiredRuns: 3
    levels:
      - cost: 4
        effect: { type: extraLives, value: 1 }
      - cost: 7
        effect: { type: extraLives, value: 1 }
      - cost: 11
        effect: { type: extraLives, value: 1 }

  - id: performance-suite
    name: Performance Suite
    description: Permanently higher score multiplier - a reward for mastering Performance Bonus.
    unlockType: upgrade-chain
    sourceUpgradeId: performance_bonus_principal
    requiredRuns: 3
    levels:
      - cost: 3
        effect: { type: scoreMultiplier, value: 1.05 }
      - cost: 5
        effect: { type: scoreMultiplier, value: 1.05 }
      - cost: 8
        effect: { type: scoreMultiplier, value: 1.05 }

  - id: investment-strategy
    name: Investment Strategy
    description: Permanent interest bonus on your score - a reward for mastering Venture Capital.
    unlockType: upgrade-chain
    sourceUpgradeId: venture_capital_architect
    requiredRuns: 3
    levels:
      - cost: 4
        effect: { type: scoreInterestRate, value: 0.03 }
      - cost: 7
        effect: { type: scoreInterestRate, value: 0.03 }

  - id: process-optimiser
    name: Process Optimiser
    description: Permanently reduce ball speed by 1% per locked ball, even without the upgrade. A reward for mastering MicroManager.
    unlockType: upgrade-chain
    sourceUpgradeId: micro_manager_principal
    requiredRuns: 3
    # Single level: the per-lock reduction is capped at 1% total, so extra
    # levels would do nothing (see MAX_MICRO_MANAGER_PER_LOCK).
    levels:
      - cost: 6
        effect: { type: microManagerPerLock, value: 0.01 }

  - id: sprint-protocol
    name: Sprint Protocol
    description: Permanent extra bounce in path preview - a reward for mastering SCRUM Master.
    unlockType: upgrade-chain
    sourceUpgradeId: scrum_master_6
    requiredRuns: 3
    levels:
      - cost: 5
        effect: { type: ballPathPredictionBounces, value: 1 }
      - cost: 9
        effect: { type: ballPathPredictionBounces, value: 1 }

  # ═══════════════════════════════════════════════════
  # ACHIEVEMENT-LOCKED CERTIFICATES
  # Unlocked by completing a specific achievement.
  # ═══════════════════════════════════════════════════

  - id: head-start-i
    name: Head Start I
    description: Begin every run at level 5. Awarded to those who have proven they can reach level 25.
    unlockType: achievement
    # NOTE: must match an existing id in achievements.yml ("reach level 25")
    sourceAchievementId: principal-engineer
    levels:
      - cost: 15
        effect: { type: startingLevelBonus, value: 5 }

  - id: head-start-ii
    name: Head Start II
    description: Begin every run at level 10. Awarded for exceptional consistency across 50 perfect levels.
    unlockType: achievement
    # NOTE: must match an existing id in achievements.yml ("50 flawless levels")
    sourceAchievementId: ci-cd-pipeline
    levels:
      - cost: 30
        effect: { type: startingLevelBonus, value: 10 }

  # ═══════════════════════════════════════════════════
  # HOURS-SPENT CERTIFICATES
  # Unlocked by spending Certificate Hours in this store.
  # ═══════════════════════════════════════════════════

  - id: equity-grant
    name: Equity Grant
    description: Start every map with part of the board already captured. Vesting begins immediately.
    unlockType: hours-spent
    requiredHoursSpent: 25
    levels:
      - cost: 12
        effect: { type: startingCapturePercent, value: 5 }
      - cost: 18
        effect: { type: startingCapturePercent, value: 3 }
      - cost: 25
        effect: { type: startingCapturePercent, value: 4 }

  # ═══════════════════════════════════════════════════
  # MORE ACHIEVEMENT-LOCKED CERTIFICATES
  # ═══════════════════════════════════════════════════

  - id: night-school-diploma
    name: Night School Diploma
    description: Bank extra Certificate Hours every run. Ascending accelerates everything.
    unlockType: achievement
    # "Beyond The Backlog" — ascend past the final level
    sourceAchievementId: beyond-the-backlog
    levels:
      - cost: 10
        effect: { type: extraCertificateHours, value: 1 }
      - cost: 18
        effect: { type: extraCertificateHours, value: 1 }

  - id: bulk-licensing
    name: Bulk Licensing
    description: Permanent discount on all upgrade-shop prices. Procurement finally negotiated a framework agreement.
    unlockType: achievement
    # "Staff Engineer" — reach level 30
    sourceAchievementId: staff-engineer
    levels:
      - cost: 10
        effect: { type: shopDiscountMultiplier, value: 0.93 }
      - cost: 16
        effect: { type: shopDiscountMultiplier, value: 0.95 }
      - cost: 22
        effect: { type: shopDiscountMultiplier, value: 0.95 }

  - id: risk-assessment-certified
    name: Risk Assessment Certified
    description: Push-Your-Luck bonuses pay out more. Audited, stamped, and underwritten.
    unlockType: achievement
    # "Calculated Risk" — bank 5 push bonuses
    sourceAchievementId: calculated-risk
    levels:
      - cost: 8
        effect: { type: pushBonusMultiplier, value: 1.5 }
      - cost: 14
        effect: { type: pushBonusMultiplier, value: 1.3 }
