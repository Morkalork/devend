# Destruct-up rewards (issue #38): the abilities a smashed treasure chest can
# grant. Each entry is ONE CHARGE of an activatable ability, banked run-wide and
# spent from the ability bar beneath the board. Earning these is the whole reason
# to seek out and break chests.
#
# A chest rolls (weighted, seeded) among every reward whose `startLevel` is <=
# the current level. A chest in map.yml may set `chestRewards: [ids]` to narrow
# its own pool (intersected with what is unlocked). `kind` selects the coded
# effect; you can add new named variants / retune freely here, but a genuinely
# NEW kind needs a small code addition in src/lib/abilityEffects.ts.
#
# Fields:
#   id              unique key (also the id used in a chest's chestRewards pool)
#   name            display name shown in the bar / toast / level-complete summary
#   kind            effect kind: freeze | slow | clearFences
#   color           gem + button colour (hex WITH a leading '#', quote it)
#   weight          relative roll weight within an eligible pool
#   startLevel      lowest level at which this reward may appear in a chest
#   durationSeconds (freeze / slow) how long the effect lasts
#   factor          (slow only) creepFactor multiplier while active (<1 = slower)
#   targeted        true = tap to arm, then tap the board to pick a point (magnet)
#   description     one-line "what it does" (shown in the info modal)
#   howTo           one-line "how to use it" (shown in the info modal)

abilities:
  - id: freezeAll
    name: Freeze All
    kind: freeze
    color: "#7fd4ff"
    weight: 3
    startLevel: 1
    durationSeconds: 3
    description: "Freezes every ball on the map in place for a few seconds."
    howTo: "Tap to freeze all balls, then cut freely while they are held."

  - id: slowAll
    name: Slow All
    kind: slow
    color: "#a0d8ff"
    weight: 3
    startLevel: 1
    durationSeconds: 5
    factor: 0.45
    description: "Slows every ball for a few seconds, making them easier to trap."
    howTo: "Tap to slow all balls, then line up your cuts."

  - id: clearFences
    name: Clear Fences
    kind: clearFences
    color: "#ffd76b"
    weight: 2
    startLevel: 7
    description: "Shatters all your fences and reopens the space they captured. Locked balls stay locked and keep their points."
    howTo: "Tap to reset your fences when a map gets away from you."

  # Magnet: pull every active ball toward a point YOU pick so they cluster -
  # set up a big multi-lock or wall off a large empty area. One-shot, targeted.
  - id: magnet
    name: Magnet
    kind: magnet
    color: "#b98cff"
    weight: 2
    startLevel: 4
    targeted: true
    description: "Pulls every ball toward a spot you choose, to gather them for a big trap."
    howTo: "Tap to activate, then tap the board where you want the balls pulled."

  # Shockwave: push every active ball away from the centre, scattering a
  # cluster and driving balls to the edges. One-shot.
  - id: shockwave
    name: Shockwave
    kind: shockwave
    color: "#ff9e6b"
    weight: 2
    startLevel: 4
    factor: 1.25
    description: "Blasts every ball outward from the centre, scattering a cluster."
    howTo: "Tap to push the balls apart and clear a space."

  # Fence Overclock: your cuts build much faster for a few seconds - carve the
  # board aggressively (great right after a Freeze or Slow).
  - id: fenceOverclock
    name: Fence Overclock
    kind: fenceRush
    color: "#6bffb0"
    weight: 2
    startLevel: 10
    durationSeconds: 4
    factor: 6
    description: "Your fences build almost instantly for a few seconds."
    howTo: "Tap, then draw cuts fast while it lasts (great after a Freeze)."

  # Fence Shield: your growing fence ignores ball hits for a few seconds, so a
  # cut through a busy lane survives instead of shattering.
  - id: fenceShield
    name: Fence Shield
    kind: fenceShield
    color: "#7fd4ff"
    weight: 2
    startLevel: 10
    durationSeconds: 5
    description: "Your growing fence ignores ball hits for a few seconds."
    howTo: "Tap, then draw a cut through a busy area without it breaking."
