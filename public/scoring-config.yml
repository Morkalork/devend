# Overtime Scoring Configuration
# Values are in overtime hours (small integers).

scoring:
  # Fence Efficiency Bonus
  # +1h if any fences under par
  fenceEfficiency:
    maxBonus: 1
    steps:
      - fencesUnder: 1
        bonus: 1

  # Space Optimization Bonus
  # +1h if removed 10%+ more than required
  spaceOptimization:
    maxBonus: 1
    thresholds:
      - extraPercent: 0.10
        bonus: 1

  # Fence Penalty Multiplier
  # Reduces space bonus when player exceeds par fences
  fencePenaltyMultiplier:
    overPar0: 1.0      # At or under par: full space bonus
    overPar1: 0.5      # 1-2 over par: halved
    overPar2: 0.5      # 1-2 over par: halved
    overPar3Plus: 0.0  # 3+ over par: no space bonus
