# Overtime Scoring Configuration
# Values are in overtime hours.

scoring:
  # Per-level overtime cap multiplier.
  # cap = round(basePoints × overtimeCapHeadroom). With the lock-centric
  # economy the base (points: 20) is only the floor; the headroom leaves room
  # for the lock bonuses that make up most of a map's real income, while
  # bounding extreme multiplier stacks (cap = 20 × 4 = 80h, same absolute
  # ceiling as the old 40 × 2 economy).
  overtimeCapHeadroom: 4.0

  # Lock Value
  # Overtime hours paid per lock-multiplier point when a ball is locked away.
  # Red/blue/grey (x1) pay 12h, yellow/purple/green (x2) 24h, black (x4) 48h,
  # before the quality, simultaneous-trap and money-ball multipliers. Locking
  # IS the income: the flat map base (points: 20) alone cannot fund even a
  # Junior upgrade (40h), so clearing without locking means an empty-handed
  # shop visit unless you had hours saved.
  lockValue: 12

  # Lock Quality (Superior Locks)
  # A lock is SUPERIOR when the sealed pocket is tight: at most
  # superiorThresholdFraction of the BASE lock threshold (game-config.yml
  # lock.win_threshold_percent, so upgrades that widen the lock threshold do
  # not also widen this). Superior locks pay lockValue x superiorMultiplier
  # per lock-multiplier point; a sliver-floor lock (min_region_cells) always
  # grades superior. The sloppy-vs-tight gap is the skill economy: on map 1 a
  # sloppy red lock (20 + 12 = 32h) cannot buy a Junior (40h), a superior one
  # (20 + 24 = 44h) can.
  lockQuality:
    superiorThresholdFraction: 0.4
    superiorMultiplier: 2.0

  # Beat-the-highscore bonus (#45)
  # When you finish a map with a higher score than its previous highscore, the
  # map's score is multiplied by this. Applied after the per-map cap, so beating
  # a record always pays. Only fires if the map has been played before.
  highscoreBonusMultiplier: 1.25

  # Under-Par Bonus
  # +1h if any fences under par
  fenceEfficiency:
    maxBonus: 1
    steps:
      - fencesUnder: 1
        bonus: 1

  # Space Optimization Bonus
  # Ascending ladder: the more you clear past the level's requirement, the more
  # overtime you bank. extraPercent is the extra area removed as a fraction of
  # what was required (e.g. required 70%, removed 90% => +28% extra). We award
  # the highest rung whose floor is met, capped at maxBonus. Rewards greedy,
  # push-your-luck removal. Disabled when 3+ over par.
  spaceOptimization:
    maxBonus: 3
    thresholds:
      - extraPercent: 0.10   # +10% over required
        bonus: 1
      - extraPercent: 0.30   # +30% over required
        bonus: 2
      - extraPercent: 0.55   # +55% over required (near-total clears)
        bonus: 3

  # Ship Early Bonus
  # Ladder of ACTIVE-play seconds to first meet the win condition (the push
  # prompt opening, or the last ball locking). Windows are PER BALL: a map's
  # actual window = withinSecondsPerBall x its ball count, so busy maps get
  # proportionally more time (e.g. 15s/ball => a 4-ball map has 60s for the
  # +1h rung, a 2-ball map 30s). Pauses, menus and the push prompt itself do
  # not count, so push-your-luck time is never taxed. Note: if the threshold
  # is crossed by destroying objects, the clock runs until the next cut
  # confirms it (the existing win rule). Awards the best rung whose window
  # was met, capped at maxBonus; folds under the per-map cap. The tempo
  # counterpart to spaceOptimization: speed and precision are parallel,
  # competing payoffs.
  shipEarly:
    maxBonus: 3
    thresholds:
      - withinSecondsPerBall: 6   # blazing clear
        bonus: 3
      - withinSecondsPerBall: 10
        bonus: 2
      - withinSecondsPerBall: 15
        bonus: 1

  # Performance Multiplier
  # Scales base points based on fences vs par
  performanceMultiplier:
    underPar: 1.0     # At or under par: full base
    atPar: 1.0        # At par: full base
    overPar1: 0.75    # 1 over par
    overPar2: 0.6     # 2 over par
    overPar3Plus: 0.4  # 3+ over par: also disables space bonus
