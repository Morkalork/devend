# Unlockable game features (the "Feature Unlocked" system).
#
# A feature stays hidden until the player completes `unlockLevel` on the real
# run (ascension depth 0), at which point a one-time "Feature Unlocked" modal
# appears and the feature is remembered forever.
#
# Fields:
#   id          stable key; also the i18n namespace (features.<id>.name / .body)
#   unlockLevel completing this level number unlocks the feature. OPTIONAL: omit
#               it for features unlocked by an in-game EVENT instead of a level
#               (those are armed from code, e.g. certificates on the first hour).
#   icon        lucide-react icon NAME shown in the modal. Must be listed in the
#               FeatureUnlockedModal icon map; an unmapped name falls back to a
#               default badge.
#   color       accent colour of the "Feature Unlocked" modal (hex with '#').
#               Tints the modal border + glow, the icon badge, and the feature
#               name heading. Does NOT affect the feature's own in-game UI.
#
# To add a feature: add an entry here, add its features.<id>.name / .body to
# every locale in src/i18n/locales, and gate its UI on isFeatureUnlocked('<id>').

features:
  # Achievements: unlocked by completing level 5.
  - id: achievements
    unlockLevel: 5
    icon: Trophy
    color: "#ffd24a"

  # Certificates: unlocked the first time the player earns a certificate hour
  # (an EVENT, not a level - armed in code from handleCertificateHourEarned).
  - id: certificates
    icon: Award
    color: "#7fd4ff"

  # Loadouts: earned by beating the first boss on level 10.
  - id: loadouts
    unlockLevel: 10
    icon: Backpack
    color: "#00ff88"
