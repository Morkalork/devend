upgrades:

  # ===============================
  # RUNTIME OPTIMISATION (Ball Speed)
  # ===============================

  - id: runtime_optimisation_junior
    name: Runtime Optimisation
    tier: Junior
    description: Reduce ball speed by 5%.
    cost: 3
    modifiers:
      ballSpeedMultiplier: 0.95

  - id: runtime_optimisation_senior
    name: Runtime Optimisation
    tier: Senior
    description: Reduce ball speed by 10%.
    cost: 6
    prerequisites:
      - runtime_optimisation_junior
    modifiers:
      ballSpeedMultiplier: 0.90

  - id: runtime_optimisation_principal
    name: Runtime Optimisation
    tier: Principal
    description: Reduce ball speed by 15%.
    cost: 11
    prerequisites:
      - runtime_optimisation_senior
    modifiers:
      ballSpeedMultiplier: 0.85


  # ===============================
  # MEMORY FOOTPRINT (Ball Size)
  # ===============================

  - id: memory_footprint_junior
    name: Memory Footprint
    tier: Junior
    description: Reduce ball size by 5%.
    cost: 3
    modifiers:
      ballSizeMultiplier: 0.95

  - id: memory_footprint_senior
    name: Memory Footprint
    tier: Senior
    description: Reduce ball size by 10%.
    cost: 6
    prerequisites:
      - memory_footprint_junior
    modifiers:
      ballSizeMultiplier: 0.90

  - id: memory_footprint_principal
    name: Memory Footprint
    tier: Principal
    description: Reduce ball size by 15%.
    cost: 11
    prerequisites:
      - memory_footprint_senior
    modifiers:
      ballSizeMultiplier: 0.85


  # ===============================
  # FAST COMPILE (Fence Speed)
  # ===============================

  - id: fast_compile_junior
    name: Fast Compile
    tier: Junior
    description: Increase fence generation speed by 10%.
    cost: 3
    modifiers:
      fenceGenerationSpeedMultiplier: 1.10

  - id: fast_compile_senior
    name: Fast Compile
    tier: Senior
    description: Increase fence generation speed by 20%.
    cost: 6
    prerequisites:
      - fast_compile_junior
    modifiers:
      fenceGenerationSpeedMultiplier: 1.20

  - id: fast_compile_principal
    name: Fast Compile
    tier: Principal
    description: Increase fence generation speed by 30%.
    cost: 11
    prerequisites:
      - fast_compile_senior
    modifiers:
      fenceGenerationSpeedMultiplier: 1.30


  # ===============================
  # STRONG TYPING (Fence Width)
  # ===============================

  - id: strong_typing_junior
    name: Strong Typing
    tier: Junior
    description: Increase fence width by 10%.
    cost: 4
    modifiers:
      fenceWidthMultiplier: 1.10

  - id: strong_typing_senior
    name: Strong Typing
    tier: Senior
    description: Increase fence width by 20%.
    cost: 8
    prerequisites:
      - strong_typing_junior
    modifiers:
      fenceWidthMultiplier: 1.20

  - id: strong_typing_principal
    name: Strong Typing
    tier: Principal
    description: Increase fence width by 30%.
    cost: 14
    prerequisites:
      - strong_typing_senior
    modifiers:
      fenceWidthMultiplier: 1.30


  # ===============================
  # HOT START (Instant Fences)
  # ===============================

  - id: hot_start_junior
    name: Hot Start
    tier: Senior
    description: First fence in each map generates instantly.
    cost: 8
    modifiers:
      instantFencesPerMap: 1

  - id: hot_start_principal
    name: Hot Start
    tier: Principal
    description: First two fences in each map generate instantly.
    cost: 14
    prerequisites:
      - hot_start_junior
    modifiers:
      instantFencesPerMap: 2

  - id: hot_start_architect
    name: Hot Start
    tier: Architect
    description: First three fences in each map generate instantly.
    cost: 22
    prerequisites:
      - hot_start_principal
    modifiers:
      instantFencesPerMap: 3


  # ===============================
  # BUILD CACHE (Cooldown Reduction)
  # ===============================

  - id: build_cache_junior
    name: Build Cache
    tier: Junior
    description: Reduce fence cooldown by 10%.
    cost: 4
    modifiers:
      fenceCooldownMultiplier: 0.90

  - id: build_cache_senior
    name: Build Cache
    tier: Senior
    description: Reduce fence cooldown by 20%.
    cost: 8
    prerequisites:
      - build_cache_junior
    modifiers:
      fenceCooldownMultiplier: 0.80

  - id: build_cache_principal
    name: Build Cache
    tier: Principal
    description: Reduce fence cooldown by 30%.
    cost: 14
    prerequisites:
      - build_cache_senior
    modifiers:
      fenceCooldownMultiplier: 0.70


  # ===============================
  # MULTITHREADING (Parallel Fence)
  # ===============================

  - id: multithreading_principal
    name: Multithreading
    tier: Principal
    description: Allow one additional fence to be in progress simultaneously.
    cost: 18
    prerequisites:
      - fast_compile_senior
    modifiers:
      additionalConcurrentFences: 1


  # ===============================
  # GARBAGE COLLECTOR (Bonus Removal)
  # ===============================

  - id: garbage_collector_senior
    name: Garbage Collector
    tier: Senior
    description: Each fence has a small chance to remove an additional 5% area.
    cost: 9
    modifiers:
      bonusRemovalChance: 0.10
      bonusRemovalAmount: 0.05


  # ===============================
  # FAULT TOLERANCE (Lives)
  # ===============================

  - id: fault_tolerance_junior
    name: Fault Tolerance
    tier: Junior
    description: Gain 1 extra life.
    cost: 4
    modifiers:
      extraLives: 1

  - id: fault_tolerance_senior
    name: Fault Tolerance
    tier: Senior
    description: Gain 2 extra lives.
    cost: 9
    prerequisites:
      - fault_tolerance_junior
    modifiers:
      extraLives: 2

  - id: fault_tolerance_architect
    name: Fault Tolerance
    tier: Architect
    description: Gain 3 extra lives.
    cost: 18
    prerequisites:
      - fault_tolerance_senior
    modifiers:
      extraLives: 3


  # ===============================
  # PERFORMANCE BONUS (Score %)
  # ===============================

  - id: performance_bonus_junior
    name: Performance Bonus
    tier: Junior
    description: Gain 5% more score per map.
    cost: 4
    modifiers:
      scoreMultiplier: 1.05

  - id: performance_bonus_senior
    name: Performance Bonus
    tier: Senior
    description: Gain 10% more score per map.
    cost: 9
    prerequisites:
      - performance_bonus_junior
    modifiers:
      scoreMultiplier: 1.10

  - id: performance_bonus_principal
    name: Performance Bonus
    tier: Principal
    description: Gain 15% more score per map.
    cost: 16
    prerequisites:
      - performance_bonus_senior
    modifiers:
      scoreMultiplier: 1.15


  # ===============================
  # VENTURE CAPITAL (Interest)
  # ===============================

  - id: venture_capital_senior
    name: Venture Capital
    tier: Senior
    description: 5% interest on unused score between maps.
    cost: 10
    modifiers:
      scoreInterestRate: 0.05

  - id: venture_capital_principal
    name: Venture Capital
    tier: Principal
    description: 10% interest on unused score between maps.
    cost: 18
    prerequisites:
      - venture_capital_senior
    modifiers:
      scoreInterestRate: 0.10

  - id: venture_capital_architect
    name: Venture Capital
    tier: Architect
    description: 15% interest on unused score between maps.
    cost: 28
    prerequisites:
      - venture_capital_principal
    modifiers:
      scoreInterestRate: 0.15


  # ===============================
  # AGGRESSIVE REFACTOR (Map Reduction)
  # ===============================

  - id: aggressive_refactor_senior
    name: Aggressive Refactor
    tier: Senior
    description: Each fence reduces an additional 5% of the map.
    cost: 9
    modifiers:
      mapReductionPerFenceBonus: 0.05

  - id: aggressive_refactor_principal
    name: Aggressive Refactor
    tier: Principal
    description: Each fence reduces an additional 10% of the map.
    cost: 16
    prerequisites:
      - aggressive_refactor_senior
    modifiers:
      mapReductionPerFenceBonus: 0.10

  - id: aggressive_refactor_architect
    name: Aggressive Refactor
    tier: Architect
    description: Each fence reduces an additional 15% of the map.
    cost: 26
    prerequisites:
      - aggressive_refactor_principal
    modifiers:
      mapReductionPerFenceBonus: 0.15


  # ===============================
  # ARCHITECT & WIZARD
  # ===============================

  - id: system_architect
    name: System Architect
    tier: Architect
    description: Gain one additional shop item slot.
    cost: 20
    modifiers:
      extraShopItems: 1

  - id: augmentation_wizard
    name: Augmentation Wizard
    tier: Wizard
    description: Gain +1 augmentation point.
    cost: 35
    modifiers:
      extraAugmentationPoints: 1
