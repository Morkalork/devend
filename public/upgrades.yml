  # Tap a ball to halt it in place. Uses are limited per map and refill each
  # map: one freeze at Junior/Senior. Principal is a CHOICE (choiceGroup, costs
  # 50% more) between two 1-second freezes or a single 3-second freeze. After a
  # ball thaws it briefly cannot be re-frozen (per-ball cooldown).
  # Head of the freeze archetype.
  # ===============================

