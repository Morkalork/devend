upgrades:

  # ===============================
  # RUNTIME OPTIMISATION (Ball Speed)
  # ===============================

  - id: runtime_optimisation_junior
    name: Runtime Optimisation
    tier: Junior
    description: Reduce ball speed by 5%.
    cost: 8
    unlockLevel: 1
    icon: clock
    modifiers:
      ballSpeedMultiplier: 0.95

  - id: runtime_optimisation_senior
    name: Runtime Optimisation
    tier: Senior
    description: Reduce ball speed by 10%.
    cost: 14
    unlockLevel: 3
    prerequisites:
      - runtime_optimisation_junior
    modifiers:
      ballSpeedMultiplier: 0.90

  - id: runtime_optimisation_principal
    name: Runtime Optimisation
    tier: Principal
    description: Reduce ball speed by 15%.
    cost: 24
    unlockLevel: 5
    prerequisites:
      - runtime_optimisation_senior
    modifiers:
      ballSpeedMultiplier: 0.85


  # ===============================
  # MEMORY FOOTPRINT (Ball Size)
  # ===============================

  - id: memory_footprint_junior
    name: Memory Footprint
    tier: Junior
    description: Reduce ball size by 5%.
    cost: 8
    unlockLevel: 1
    icon: memory
    modifiers:
      ballSizeMultiplier: 0.95

  - id: memory_footprint_senior
    name: Memory Footprint
    tier: Senior
    description: Reduce ball size by 10%.
    cost: 14
    unlockLevel: 5
    prerequisites:
      - memory_footprint_junior
    modifiers:
      ballSizeMultiplier: 0.90

  - id: memory_footprint_principal
    name: Memory Footprint
    tier: Principal
    description: Reduce ball size by 15%.
    cost: 24
    unlockLevel: 10
    prerequisites:
      - memory_footprint_senior
    modifiers:
      ballSizeMultiplier: 0.85


  # ===============================
  # FAST COMPILE (Fence Speed)
  # ===============================

  - id: fast_compile_junior
    name: Fast Compile
    tier: Junior
    description: Increase fence generation speed by 10%.
    cost: 8
    unlockLevel: 1
    icon: fast-forward
    modifiers:
      fenceGenerationSpeedMultiplier: 1.10

  - id: fast_compile_senior
    name: Fast Compile
    tier: Senior
    description: Increase fence generation speed by 20%.
    cost: 14
    unlockLevel: 5
    prerequisites:
      - fast_compile_junior
    modifiers:
      fenceGenerationSpeedMultiplier: 1.20

  - id: fast_compile_principal
    name: Fast Compile
    tier: Principal
    description: Increase fence generation speed by 30%.
    cost: 24
    unlockLevel: 10
    prerequisites:
      - fast_compile_senior
    modifiers:
      fenceGenerationSpeedMultiplier: 1.30


  # ===============================
  # HOT START (Instant Fences)
  # ===============================

  - id: hot_start_junior
    name: Hot Start
    tier: Senior
    description: First fence in each map generates instantly.
    cost: 16
    unlockLevel: 5
    prerequisites:
      - fast_compile_senior
    icon: flame
    modifiers:
      instantFencesPerMap: 1

  - id: hot_start_principal
    name: Hot Start
    tier: Principal
    description: First two fences in each map generate instantly.
    cost: 26
    unlockLevel: 10
    prerequisites:
      - hot_start_junior
    modifiers:
      instantFencesPerMap: 2

  - id: hot_start_architect
    name: Hot Start
    tier: Architect
    description: First three fences in each map generate instantly.
    cost: 36
    unlockLevel: 20
    prerequisites:
      - hot_start_principal
    modifiers:
      instantFencesPerMap: 3


  # ===============================
  # MULTITHREADING (Parallel Fence)
  # ===============================

  - id: multithreading_principal
    name: Multithreading
    tier: Principal
    description: Allow one additional fence to be in progress simultaneously.
    cost: 28
    unlockLevel: 10
    prerequisites:
      - fast_compile_senior
    icon: split
    modifiers:
      additionalConcurrentFences: 1

  - id: ultrathreading_principal
    name: Ultrathreading
    tier: Principal
    description: Allow one additional fence to be in progress simultaneously.
    cost: 28
    unlockLevel: 30
    prerequisites:
      - multithreading_principal
    icon: layers
    modifiers:
      additionalConcurrentFences: 1


  # ===============================
  # GARBAGE COLLECTOR (Bonus Removal)
  # ===============================

  - id: garbage_collector_senior
    name: Garbage Collector
    tier: Senior
    description: Each fence has a small chance to remove an additional 5% area.
    cost: 16
    unlockLevel: 5
    prerequisites:
      - memory_footprint_senior
    icon: trash
    modifiers:
      bonusRemovalChance: 0.10
      bonusRemovalAmount: 0.05

  - id: garbage_collector_medior
    name: Garbage Collector 2
    tier: Principal
    description: Each fence has a small chance to remove an additional 10% area.
    cost: 16
    unlockLevel: 20
    prerequisites:
      - garbage_collector_senior
    icon: recycle
    modifiers:
      bonusRemovalChance: 0.10
      bonusRemovalAmount: 0.10


  # ===============================
  # FAULT TOLERANCE (Lives)
  # ===============================

  - id: fault_tolerance_junior
    name: Fault Tolerance
    tier: Junior
    description: Gain 1 extra life.
    cost: 8
    unlockLevel: 5
    prerequisites:
      - system_architect
    icon: heart
    modifiers:
      extraLives: 1

  - id: fault_tolerance_senior
    name: Fault Tolerance
    tier: Senior
    description: Gain 2 extra lives.
    cost: 18
    unlockLevel: 10
    prerequisites:
      - fault_tolerance_junior
    modifiers:
      extraLives: 2

  - id: fault_tolerance_architect
    name: Fault Tolerance
    tier: Architect
    description: Gain 3 extra lives.
    cost: 36
    unlockLevel: 15
    prerequisites:
      - fault_tolerance_senior
    modifiers:
      extraLives: 3


  # ===============================
  # PERFORMANCE BONUS (Score %)
  # ===============================

  - id: performance_bonus_junior
    name: Performance Bonus
    tier: Junior
    description: Gain 5% more overtime per map.
    cost: 8
    unlockLevel: 2
    icon: trending-up
    modifiers:
      scoreMultiplier: 1.05

  - id: performance_bonus_senior
    name: Performance Bonus
    tier: Senior
    description: Gain 10% more overtime per map.
    cost: 16
    unlockLevel: 5
    prerequisites:
      - performance_bonus_junior
    modifiers:
      scoreMultiplier: 1.10

  - id: performance_bonus_principal
    name: Performance Bonus
    tier: Principal
    description: Gain 15% more overtime per map.
    cost: 26
    unlockLevel: 8
    prerequisites:
      - performance_bonus_senior
    modifiers:
      scoreMultiplier: 1.15


  # ===============================
  # VENTURE CAPITAL (Interest)
  # ===============================

  - id: venture_capital_senior
    name: Venture Capital
    tier: Senior
    description: 10% interest on unused overtime between maps.
    cost: 18
    unlockLevel: 6
    prerequisites:
      - performance_bonus_senior
    icon: piggy-bank
    modifiers:
      scoreInterestRate: 0.10

  - id: venture_capital_principal
    name: Venture Capital
    tier: Principal
    description: 20% interest on unused overtime between maps.
    cost: 28
    unlockLevel: 7
    prerequisites:
      - venture_capital_senior
    modifiers:
      scoreInterestRate: 0.20

  - id: venture_capital_architect
    name: Venture Capital
    tier: Architect
    description: 30% interest on unused overtime between maps.
    cost: 40
    unlockLevel: 11
    prerequisites:
      - venture_capital_principal
    modifiers:
      scoreInterestRate: 0.30


  # ===============================
  # MICRO MANAGER (Per-Lock Speed)
  # ===============================

  - id: micro_manager_junior
    name: MicroManager
    tier: Junior
    description: Each locked ball reduces all ball speeds by 1%, up to 50%.
    cost: 12
    unlockLevel: 3
    prerequisites:
      - runtime_optimisation_senior
    icon: sliders
    modifiers:
      microManagerPerLock: 0.01

  - id: micro_manager_senior
    name: MicroManager
    tier: Senior
    description: Each locked ball reduces all ball speeds by an additional 2%, up to 50% total.
    cost: 22
    unlockLevel: 8
    prerequisites:
      - micro_manager_junior
    modifiers:
      microManagerPerLock: 0.02

  - id: micro_manager_principal
    name: MicroManager
    tier: Principal
    description: Each locked ball reduces all ball speeds by an additional 3%, up to 50% total.
    cost: 34
    unlockLevel: 15
    prerequisites:
      - micro_manager_senior
    modifiers:
      microManagerPerLock: 0.03


  # ===============================
  # PROCUREMENT (Shop Restocking)
  # Each tier adds one restock: buying an item in the store
  # refills its slot with a new offer, N times per visit.
  # ===============================

  - id: procurement_junior
    name: Procurement
    tier: Junior
    description: Once per store visit, buying an item adds a new offer to the shelf.
    cost: 12
    unlockLevel: 3
    prerequisites:
      - fault_tolerance_senior
    icon: package-plus
    modifiers:
      shopRestockCount: 1

  - id: procurement_senior
    name: Procurement
    tier: Senior
    description: Your first two purchases per store visit each add a new offer to the shelf.
    cost: 20
    unlockLevel: 7
    prerequisites:
      - procurement_junior
    modifiers:
      shopRestockCount: 1

  - id: procurement_principal
    name: Procurement
    tier: Principal
    description: Your first three purchases per store visit each add a new offer to the shelf.
    cost: 30
    unlockLevel: 12
    prerequisites:
      - procurement_senior
    modifiers:
      shopRestockCount: 1


  # ===============================
  # ARCHITECT & WIZARD
  # ===============================

  - id: system_architect
    name: System Architect
    tier: Architect
    description: Gain one additional shop item slot.
    cost: 36
    unlockLevel: 4
    icon: building
    modifiers:
      extraShopItems: 1

  - id: augmentation_wizard
    name: Certification Wizard
    tier: Wizard
    description: Gain +1 Certificate Hour.
    cost: 55
    unlockLevel: 10
    prerequisites:
      - technical_debt_principal
    icon: graduation-cap
    modifiers:
      extraCertificateHours: 1


  # ===============================
  # TECHNICAL DEBT (Score + Speed tradeoff)
  # ===============================

  - id: technical_debt_senior
    name: Technical Debt
    tier: Senior
    description: Earn 20% more overtime per map — but balls move 8% faster. Short-term gain, long-term pain.
    cost: 14
    unlockLevel: 4
    prerequisites:
      - venture_capital_principal
    icon: credit-card
    modifiers:
      scoreMultiplier: 1.20
      ballSpeedMultiplier: 1.08

  - id: technical_debt_principal
    name: Technical Debt
    tier: Principal
    description: Earn 35% more overtime per map — but balls move 15% faster.
    cost: 26
    unlockLevel: 8
    prerequisites:
      - technical_debt_senior
    modifiers:
      scoreMultiplier: 1.35
      ballSpeedMultiplier: 1.15

  - id: technical_debt_architect
    name: Technical Debt
    tier: Architect
    description: Earn 50% more overtime per map — but balls move 25% faster.
    cost: 40
    unlockLevel: 14
    prerequisites:
      - technical_debt_principal
    modifiers:
      scoreMultiplier: 1.50
      ballSpeedMultiplier: 1.25


  # ===============================
  # DEFENSIVE PROGRAMMING (Lives + Ball Size)
  # ===============================

  - id: defensive_programming_junior
    name: Defensive Programming
    tier: Junior
    description: Gain 1 extra life and shrink all balls by 8%. Safety first.
    cost: 12
    unlockLevel: 5
    icon: shield
    modifiers:
      extraLives: 1
      ballSizeMultiplier: 0.92

  - id: defensive_programming_senior
    name: Defensive Programming
    tier: Senior
    description: Gain 2 more extra lives and shrink all balls by an additional 8%.
    cost: 22
    unlockLevel: 10
    prerequisites:
      - defensive_programming_junior
    modifiers:
      extraLives: 2
      ballSizeMultiplier: 0.92

  - id: defensive_programming_principal
    name: Defensive Programming
    tier: Principal
    description: Gain 3 more extra lives and shrink all balls by an additional 8%.
    cost: 36
    unlockLevel: 20
    prerequisites:
      - defensive_programming_senior
    modifiers:
      extraLives: 3
      ballSizeMultiplier: 0.92


  # ===============================
  # SCRUM MASTER (Ball Path Preview)
  # ===============================

  - id: scrum_master_1
    name: SCRUM Master
    tier: Junior
    description: Preview the next 2 bounces of the fastest ball's path.
    cost: 12
    unlockLevel: 4
    icon: route
    modifiers:
      ballPathPredictionBounces: 2
      ballPathPredictionBalls: 1

  - id: scrum_master_2
    name: SCRUM Master
    tier: Senior
    description: Also preview the 2nd fastest ball's path.
    cost: 18
    unlockLevel: 7
    prerequisites:
      - scrum_master_1
    modifiers:
      ballPathPredictionBalls: 1

  - id: scrum_master_3
    name: SCRUM Master
    tier: Senior
    description: Also preview the 3rd fastest ball's path.
    cost: 24
    unlockLevel: 10
    prerequisites:
      - scrum_master_2
    modifiers:
      ballPathPredictionBalls: 1

  - id: scrum_master_4
    name: SCRUM Master
    tier: Principal
    description: Extend path preview to 3 bounces ahead for tracked balls.
    cost: 32
    unlockLevel: 13
    prerequisites:
      - scrum_master_3
    modifiers:
      ballPathPredictionBounces: 1

  - id: scrum_master_5
    name: SCRUM Master
    tier: Principal
    description: Extend path preview to 4 bounces ahead.
    cost: 40
    unlockLevel: 16
    prerequisites:
      - scrum_master_4
    modifiers:
      ballPathPredictionBounces: 1

  - id: scrum_master_6
    name: SCRUM Master
    tier: Architect
    description: Show path preview for all balls simultaneously.
    cost: 52
    unlockLevel: 19
    prerequisites:
      - scrum_master_5
    modifiers:
      ballPathPredictionBalls: 999

  # ===============================
  # FEATURE FREEZE (Tap-to-freeze a ball)
  # Tap any ball to halt it in place. After it thaws, that ball briefly
  # can't be re-frozen (cooldown = freeze duration × 2). Durations stack.
  # ===============================

  - id: feature_freeze_junior
    name: Feature Freeze
    tier: Junior
    description: Tap a ball to freeze it in place for 2 seconds.
    cost: 14
    unlockLevel: 4
    prerequisites:
      - scrum_master_2
    icon: snowflake
    modifiers:
      ballFreezeDuration: 2

  - id: feature_freeze_senior
    name: Feature Freeze
    tier: Senior
    description: Tapped balls now freeze for 4 seconds.
    cost: 24
    unlockLevel: 8
    prerequisites:
      - feature_freeze_junior
    modifiers:
      ballFreezeDuration: 2

  - id: feature_freeze_principal
    name: Feature Freeze
    tier: Principal
    description: Tapped balls now freeze for 6 seconds.
    cost: 36
    unlockLevel: 14
    prerequisites:
      - feature_freeze_senior
    modifiers:
      ballFreezeDuration: 2


  # ===============================
  # CASCADE FREEZE (Multi-ball freeze)
  # Only unlocks once Feature Freeze is mastered (all three tiers) this run.
  # A single tap freezes the tapped ball plus the nearest others in its region.
  # ===============================

  - id: cascade_freeze_junior
    name: Cascade Freeze
    tier: Senior
    description: A single freeze tap now freezes the 2 nearest balls.
    cost: 30
    unlockLevel: 14
    prerequisites:
      - feature_freeze_principal
    icon: cloud-snow
    modifiers:
      ballFreezeCount: 1

  - id: cascade_freeze_senior
    name: Cascade Freeze
    tier: Principal
    description: A single freeze tap now freezes the 3 nearest balls.
    cost: 44
    unlockLevel: 18
    prerequisites:
      - cascade_freeze_junior
    modifiers:
      ballFreezeCount: 1

  - id: cascade_freeze_principal
    name: Cascade Freeze
    tier: Architect
    description: Frozen balls now stay frozen for 8 seconds.
    cost: 58
    unlockLevel: 22
    prerequisites:
      - cascade_freeze_senior
    modifiers:
      ballFreezeDuration: 2


  # ===============================
  # CRON JOB (Automatic timed freeze)
  # A scheduled task: every 10 seconds it freezes one random ball in place.
  # Tiers extend how long the freeze holds (3 → 4 → 5 seconds).
  # ===============================

  - id: cron_job_senior
    name: Cron Job
    tier: Senior
    description: Every 10 seconds, automatically freeze a random ball in place for 3 seconds.
    cost: 30
    unlockLevel: 20
    prerequisites:
      - feature_freeze_principal
    icon: calendar-clock
    modifiers:
      autoFreezeDuration: 3

  - id: cron_job_principal
    name: Cron Job
    tier: Principal
    description: Scheduled freezes now hold a ball for 4 seconds.
    cost: 42
    unlockLevel: 22
    prerequisites:
      - cron_job_senior
    modifiers:
      autoFreezeDuration: 1

  - id: cron_job_architect
    name: Cron Job
    tier: Architect
    description: Scheduled freezes now hold a ball for 5 seconds.
    cost: 54
    unlockLevel: 24
    prerequisites:
      - cron_job_principal
    modifiers:
      autoFreezeDuration: 1


  # ===============================
  # DEFENSIVE PROGRAMMING (Ascension fence durability)
  # Only offered while ascended — fences wear out past level 30.
  # ===============================

  - id: defensive_programming_ascension_junior
    name: Defensive Programming
    tier: Junior
    description: Fences survive 1 extra ball hit before crumbling (Ascension).
    cost: 10
    unlockLevel: 30
    ascensionOnly: true
    modifiers:
      fenceDurabilityBonus: 1

  - id: defensive_programming_ascension_senior
    name: Defensive Programming
    tier: Senior
    description: Fences survive 2 extra ball hits before crumbling (Ascension).
    cost: 18
    unlockLevel: 30
    ascensionOnly: true
    prerequisites:
      - defensive_programming_ascension_junior
    modifiers:
      fenceDurabilityBonus: 1

  - id: defensive_programming_ascension_principal
    name: Defensive Programming
    tier: Principal
    description: Fences survive 3 extra ball hits before crumbling (Ascension).
    cost: 30
    unlockLevel: 30
    ascensionOnly: true
    prerequisites:
      - defensive_programming_ascension_senior
    modifiers:
      fenceDurabilityBonus: 1
