    description: Reduce ball size by 15%.
    cost: 24
    unlockLevel: 10
    prerequisites:
      - memory_footprint_senior
    modifiers:
      ballSizeMultiplier: 0.85


  # ===============================
  # FAST COMPILE (Fence Speed)
  # ===============================

  - id: fast_compile_junior
    name: Fast Compile
    tier: Junior
    description: Increase fence generation speed by 10%.
    cost: 8
    unlockLevel: 1
    modifiers:
      fenceGenerationSpeedMultiplier: 1.10

  - id: fast_compile_senior
    name: Fast Compile
    tier: Senior
    description: Increase fence generation speed by 20%.
    cost: 14
    unlockLevel: 5
    prerequisites:
      - fast_compile_junior
    modifiers:
      fenceGenerationSpeedMultiplier: 1.20

  - id: fast_compile_principal
    name: Fast Compile
    tier: Principal
    description: Increase fence generation speed by 30%.
    cost: 24
    unlockLevel: 10
    prerequisites:
      - fast_compile_senior
    modifiers:
      fenceGenerationSpeedMultiplier: 1.30


  # ===============================
  # STRONG TYPING (Fence Width)
  # ===============================

  - id: strong_typing_junior
    name: Strong Typing
    tier: Junior
    description: Increase fence width by 100%.
    cost: 8
    unlockLevel: 1
    modifiers:
      fenceWidthMultiplier: 2

  - id: strong_typing_senior
    name: Strong Typing
    tier: Senior
    description: Increase fence width by 200%.
    cost: 16
    unlockLevel: 10
    prerequisites:
      - strong_typing_junior
    modifiers:
      fenceWidthMultiplier: 3

  - id: strong_typing_principal
    name: Strong Typing
    tier: Principal
    description: Increase fence width by 300%.
    cost: 26
    unlockLevel: 20
    prerequisites:
      - strong_typing_senior
    modifiers:
      fenceWidthMultiplier: 4


  # ===============================
  # HOT START (Instant Fences)
  # ===============================

  - id: hot_start_junior
    name: Hot Start
    tier: Senior
    description: First fence in each map generates instantly.
    cost: 16
    unlockLevel: 5
    modifiers:
      instantFencesPerMap: 1

  - id: hot_start_principal
    name: Hot Start
    tier: Principal
    description: First two fences in each map generate instantly.
    cost: 26
    unlockLevel: 10
    prerequisites:
      - hot_start_junior
    modifiers:
      instantFencesPerMap: 2

  - id: hot_start_architect
    name: Hot Start
    tier: Architect
    description: First three fences in each map generate instantly.
    cost: 36
    unlockLevel: 20
    prerequisites:
      - hot_start_principal
    modifiers:
      instantFencesPerMap: 3


  # ===============================
  # MULTITHREADING (Parallel Fence)
  # ===============================

  - id: multithreading_principal
    name: Multithreading
    tier: Principal
    description: Allow one additional fence to be in progress simultaneously.
    cost: 28
    unlockLevel: 10
    prerequisites:
      - fast_compile_senior
    modifiers:
      additionalConcurrentFences: 1

  - id: ultrathreading_principal
    name: Ultrathreading
    tier: Principal
    description: Allow one additional fence to be in progress simultaneously.
    cost: 28
    unlockLevel: 30
    prerequisites:
      - fast_compile_senior
    modifiers:
      additionalConcurrentFences: 1


  # ===============================
  # GARBAGE COLLECTOR (Bonus Removal)
  # ===============================

  - id: garbage_collector_senior
    name: Garbage Collector
    tier: Senior
    description: Each fence has a small chance to remove an additional 5% area.
    cost: 16
    unlockLevel: 10
    modifiers:
      bonusRemovalChance: 0.10
      bonusRemovalAmount: 0.05

  - id: garbage_collector_medior
