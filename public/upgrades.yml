upgrades:
  - id: "slow_balls"
    name: "Slow Motion"
    grade: "common"
    icon: "/icons/slow.svg"
    description: "Reduces ball speed by 20%"
    levelAvailability: 1
    priceMin: 50
    priceMax: 100
    modifiers:
      ballSpeed: 0.8

  - id: "shrink_balls"
    name: "Shrink Ray"
    grade: "common"
    icon: "/icons/shrink.svg"
    description: "Makes balls 25% smaller"
    levelAvailability: 2
    priceMin: 75
    priceMax: 150
    modifiers:
      ballSize: 0.75

  - id: "fast_walls"
    name: "Quick Slice"
    grade: "uncommon"
    icon: "/icons/fast.svg"
    description: "Walls generate 30% faster"
    levelAvailability: 3
    priceMin: 100
    priceMax: 200
    modifiers:
      wallGenerationSpeed: 1.3

  - id: "reduced_target"
    name: "Easy Win"
    grade: "rare"
    icon: "/icons/easy.svg"
    description: "Reduces win threshold by 5%"
    levelAvailability: 4
    levelRemoved: 8
    priceMin: 150
    priceMax: 300
    modifiers:
      reducedSize: 0.05

  - id: "training_wheels"
    name: "Training Wheels"
    grade: "common"
    icon: "/icons/training.svg"
    description: "Lose condition is slightly more forgiving on growing walls"
    levelAvailability: 1
    levelRemoved: 3
    priceMin: 40
    priceMax: 90
    modifiers:
      wallGrace: 0.15

  - id: "extra_time"
    name: "Steady Hands"
