# Upgrade pricing (overtime economy rebalance).
# Base-game costs are computed at load time from the unlock level's base
# points x a tier factor (see src/lib/upgradePricing.ts):
#   cost = max(minCost, round(basePoints(unlockLevel) * tierFactor[tier]))
# Prices therefore scale automatically as new maps/upgrades are added.
# An explicit `cost:` on an upgrade overrides the formula (used for the
# ascension trio, whose post-L30 economy is tuned separately).
#
# Build archetypes (`tags`): every upgrade carries one or two tags — lock,
# freeze, bank, tempo, risk, safety. The shop weights its random offers toward
# tags the player already owns (draft coherence), and the card shows the tags
# as chips. See UpgradeTag in src/types/upgrade.ts.
pricing:
  minCost: 8
  # Market rates: effective prices multiply by this per completed 5-level
  # assignment block (levels 1-5 at face value, 6-10 x1.35, 11-15 x1.82...).
  # Keeps the flat per-map income scarce late-run. 1 disables inflation.
  blockInflation: 1.35
  # Factors are tuned against the lock-centric economy: base points is 20, so
  # a Junior costs 40h. A no-lock clear (20h) can never afford one, and even a
  # sloppy lock (12h, see scoring-config.yml lockValue) leaves you short; a
  # SUPERIOR lock (tight pocket, 24h) is what buys the first hire.
  tierFactor:
    Junior: 2.0
    Senior: 2.7
    Principal: 3.7
    Architect: 4.8
    Wizard: 6.0

# Set bonuses: auto-granted for free while the player owns `threshold`
# upgrades of a tag. One per archetype, giving every build direction a goal.
# Modifiers use the same GameModifiers keys as upgrades.
tagSets:
  threshold: 3
  bonuses:
    - tag: lock
      name: Chain Reaction
      description: Every lock counts as one ball bigger for the simultaneous-trap multiplier.
      modifiers:
        simultaneousLockBonus: 1
    - tag: freeze
      name: Absolute Zero
      description: Frozen balls can be re-frozen immediately, no cooldown.
      modifiers:
        freezeNoCooldown: 1
    - tag: bank
      name: Framework Agreement
      description: All shop prices drop by 10%.
      modifiers:
        shopDiscountMultiplier: 0.9
    - tag: tempo
      name: Ship It
      description: Draw one additional fence at the same time.
      modifiers:
        additionalConcurrentFences: 1
    - tag: risk
      name: Double Or Nothing
      description: Push-your-luck payouts are doubled.
      modifiers:
        pushBonusMultiplier: 2
    - tag: safety
      name: Insurance Policy
      description: Gain 1 extra Continue.
      modifiers:
        extraContinues: 1

