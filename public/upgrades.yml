    cost: 22
    unlockLevel: 8
    prerequisites:
      - micro_manager_junior
    modifiers:
      microManagerPerLock: 0.02

  - id: micro_manager_principal
    name: MicroManager
    tier: Principal
    description: Each locked ball reduces all ball speeds by an additional 3%, up to 50% total.
    cost: 34
    unlockLevel: 15
