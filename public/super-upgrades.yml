# Super Upgrades Configuration
# These are powerful, run-altering upgrades offered at game over.
# Player may purchase ONE per game-over event, costing score points.

super_upgrades:
  - id: "titan_shield"
    name: "Titan Shield"
    description: "Start with +2 extra lives"
    cost: 500
    effect:
      type: "bonus_lives"
      value: 2

  - id: "score_magnet"
    name: "Score Magnet"
    description: "Earn 25% bonus points on all cuts"
    cost: 750
    effect:
      type: "score_multiplier"
      value: 1.25

  - id: "slow_motion"
    name: "Slow Motion"
    description: "All balls move 20% slower"
    cost: 600
    effect:
      type: "ball_speed_modifier"
      value: 0.8

  - id: "precision_master"
    name: "Precision Master"
    description: "Fence lines draw 30% faster"
    cost: 400
    effect:
      type: "fence_speed_modifier"
      value: 1.3

  - id: "area_boost"
    name: "Area Boost"
    description: "Start each level with 5% already cleared"
    cost: 550
    effect:
      type: "starting_area_bonus"
      value: 5

  - id: "second_chance"
    name: "Second Chance"
    description: "Once per level, survive a hit that would lose a life"
    cost: 800
    effect:
      type: "immunity_charge"
      value: 1
