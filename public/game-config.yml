# Game Configuration
# Core visual and gameplay settings

# Visual Settings
visuals:
  # Canvas transparency (0 = fully transparent, 1 = fully opaque)
  canvas_opacity: 0.9
  
  # HUD bar transparency (0 = fully transparent, 1 = fully opaque)
  hud_opacity: 0.85
  
  # Global background color (hex without #)
  background_color: "0a1a10"
  
  # Game board / region fill color (hex without #)
  region_color: "1a3020"
  
  # Accent color used for: CRT code text, active wall/line (hex without #)
  accent_color: "00ff88"

# Ball Settings
ball:
  default_speed: 4.5
  max_speed: 12
  radius_percent: 2.5  # As percentage of board size

# Fence Settings
fence:
  # Base generation speed at level 1 (world units per second)
  speed_base: 680
  # Minimum generation speed at highest levels
  speed_min: 750
  # Speed reduction per level
  speed_per_level: 50

# Gameplay Settings
gameplay:
  starting_lives: 3
  max_lives: 5
  cut_completion_threshold: 0.75  # 75% of level must be cut to complete

# Lock Rule
# When does a ball become "locked" (trapped/won)? Tune these to find the sweet
# spot for how tightly the player must confine a ball.
lock:
  # A ball locks when its region shrinks to <= this % of the win denominator
  # (roughly a ball's fair share of the board). Lower = harder (must confine
  # tighter); higher = easier.
  win_threshold_percent: 10

  # A region with at most this many grid cells ALWAYS locks its ball, ignoring
  # the % above (0 = disabled). Set > 0 to guarantee tiny slivers resolve
  # instead of a ball bouncing forever just above the % threshold.
  min_region_cells: 0

# CRT Word Highlight Effect
# Every interval_seconds, a random visible word in the background gets a highlight rectangle.
crt_word_highlight:
  # Random delay between a highlight appearing and the next one appearing (seconds)
  interval_min_seconds: 4
  interval_max_seconds: 11

  # How long each highlight stays visible (seconds)
  display_seconds: 10

  # Duration of the word-box grow-up animation (seconds)
  grow_seconds: 1

  # Duration of each connector line grow animation (seconds)
  line_grow_seconds: 0.4

  # Color for the border and background tint (hex without #, default CRT green)
  color: "00ff88"

  # Border opacity (0-1)
  border_opacity: 0.85

  # Background fill opacity (0-1, keeps the underlying word readable)
  background_opacity: 0.2

  # Border width in pixels
  border_width: 2
